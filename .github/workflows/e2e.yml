name: E2E Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm test

  e2e:
    name: E2E — Real API
    needs: unit
    runs-on: ubuntu-latest
    env:
      E2E_API_URL: https://api.pult.rest
      E2E_CP_TOKEN: ${{ secrets.E2E_CP_TOKEN }}
      E2E_CP_TOKEN_FREE: ${{ secrets.E2E_CP_TOKEN_FREE }}
      E2E_CP_TOKEN_PRO: ${{ secrets.E2E_CP_TOKEN_PRO }}
      E2E_CP_TOKEN_ADMIN: ${{ secrets.E2E_CP_TOKEN_ADMIN }}
      E2E_CP_TOKEN_TEAM_OWNER: ${{ secrets.E2E_CP_TOKEN_TEAM_OWNER }}
      E2E_CP_TOKEN_TEAM_MEMBER: ${{ secrets.E2E_CP_TOKEN_TEAM_MEMBER }}
      E2E_CLEANUP: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Run E2E tests
        run: npx vitest run tests/e2e.test.ts --reporter=verbose
        timeout-minutes: 5
